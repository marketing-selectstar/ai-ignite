<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<style>
  /* dim layer 처리 */
    .modal {
    background-color: #fff;
    width: 100%;
    max-width: 608px;
    border-radius: 10px;
    box-shadow: 0 15px 20px rgba(0, 0, 0, 0.2);
  }
  .modal-scroll {
    padding: 40px;
    overflow: auto;
  }
  .form-section {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .form-row {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .form-row .form-col {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .form-group .form-label {
    color: #6C757D;
    font-weight: 400;
    font-size: 14px;
    line-height: 1.5;
  }
  .form-group .form-input {
    width: 100%;
    height: 42px;
    padding: 0 16px;
    border: 1px solid transparent;
    outline: 0;
    border-radius: 3px;
    background-color: rgba(248, 249, 250, 0.5);
    color: #6C757D;
    transition: all 0.3s ease-in-out;
  }
  .form-group .form-select {
    display: block;
    width: 100%;
    height: 42px;
    padding: 0 16px;
    border: 1px solid transparent;
    outline: 0;
    border-radius: 3px;
    background-color: rgba(248, 249, 250, 0.5);
    color: #B6BABD;
    font-size: 14px;
  }
  .form-group .form-textarea {
    width: 100%;
    min-height: 130px;
    padding: 16px;
    border: 1px solid transparent;
    outline: 0;
    border-radius: 3px;
    background-color: rgba(248, 249, 250, 0.5);
    color: #6C757D;
    transition: all 0.3s ease-in-out;
  }
  .form-group .form-input::placeholder,
  .form-group .form-textarea::placeholder {
    color: #B6BABD;
  }
  .form-group .form-input:focus {
    border-color: #007BFF;
  }
  .checkbox-section {
    margin-top: 20px;
  }
  .checkbox-group .form-checkbox {
    display: block;
    opacity: 0;
    width: 0;
    margin: 0;
    overflow: hidden;
    -webkit-appearance: none;
  }
  .checkbox-group .label {
    position: relative;
    display: inline-block;
    padding: 12px 10px 12px 28px;
    color: #6C757D;
    vertical-align: bottom;
    font-weight: 400;
    font-size: 14px;
    line-height: 1.5;
    cursor: pointer;
  }
  .checkbox-group .label button {
    color: #007BFF;
    border: 0;
    outline: 0;
    background-color: transparent;
    font-weight: 700;
  }
  .checkbox-group .label:before,
  .checkbox-group .label:after {
    content: '';
    position: absolute;
    border-radius: 50%;
  }
  .checkbox-group .label:before {
    left: 0;
    top: 12px;
    width: 16px;
    height: 16px;
    border: 1px solid #6C757D;
  }
  .checkbox-group .label:after {
    top: 16px;
    left: 4px;
    width: 10px;
    height: 10px;
    transform: scale(0);
    background-color: #6C757D;
  }
  .checkbox-group .form-checkbox:checked + .label:before {
    border-color: #6C757D;
  }
  .checkbox-group .form-checkbox:checked + .label:after {
    transform: scale(1);
  }
  .form-button {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 52px;
    margin-top: 28px;
    border: 0;
    border-radius: 3px;
    outline: 0;
    background-color: #007BFF;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    line-height: 50px;
    cursor: pointer;
    transition: opacity 0.3s ease;
  }
  .form-button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .spinner {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @media (min-width: 800px) {
    .form-row {
      flex-direction: row;
      gap: 40px;
    }
    .form-row .form-col {
      flex: 1;
    }
    .form-group .form-label {
      font-size: 16px;
    }
  }
</style>
<script>
  // 로딩 상태 관리 변수
  let isSubmitting = false;

  function checkValidation(){
    let data = getParam();
    if(data.isAgreePrivacy === undefined || !data.isAgreePrivacy){
      alert('개인정보 동의서에 동의해주세요.')
      return false;
    }
    if(data.name === undefined || data.name.trim() === ''){
      alert('이름을 입력해주세요.')
      return false;
    }
    if(data.phone === undefined || data.phone.trim() === ''){
      alert('연락처를 입력해주세요.')
      return false;
    }
    if(data.dataType === undefined || data.dataType.trim() === ''){
      alert('데이터 유형을 선택해주세요.')
      return false;
    }
    if(data.email === undefined || data.email.trim() === ''){
      alert('이메일을 입력해주세요.')
      return false;
    }
    if(data.company === undefined || data.company.trim() === ''){
      alert('고객사명을 입력해주세요.')
      return false;
    }
    if(data.counselingType === undefined || data.counselingType.trim() === ''){
      alert('상담유형을 선택해주세요.')
      return false;
    }
    if(data.routeType === undefined || data.routeType.trim() === ''){
      alert('방문경로를 선택해주세요.')
      return false;
    }
    if(data.description === undefined || data.description.trim() === ''){
      alert('AI 도입과 학습 데이터 등에 대해 궁금하신 점을 구체적으로 말씀해 주세요.')
      return false;
    }
    return true;
  }

  function clear(){
    document.getElementById('txf_name').value = '';
    document.getElementById('txf_phone').value = '';
    document.getElementById('txf_data_type').value = '';
    document.getElementById('txf_email').value = '';
    document.getElementById('txf_company').value = '';
    document.getElementById('counseling_type').value = '';
    document.getElementById('route_type').value = '';
    document.getElementById('txf_description').value = '';
    document.getElementById('check1').checked = true;
    document.getElementById('check2').checked = false;
  }

  const getFormatDateKorean = (_date) => {
    if(_date === undefined || _date === '' || _date === null) return '';
    let date = new Date(_date);
    let year = date.getFullYear();
    let month = (1 + date.getMonth());
    month = month >= 10 ? month : '0' + month;
    let day = date.getDate();
    day = day >= 10 ? day : '0' + day;
    return year + '년 ' + month + '월 ' + day + '일';
  }

  function setButtonLoading(isLoading) {
    const button = document.getElementById('btn_request_done');
    const buttonText = document.getElementById('button-text');
    const buttonSpinner = document.getElementById('button-spinner');
    
    if (isLoading) {
      button.disabled = true;
      buttonText.style.display = 'none';
      buttonSpinner.style.display = 'block';
    } else {
      button.disabled = false;
      buttonText.style.display = 'block';
      buttonSpinner.style.display = 'none';
    }
  }

  function doInquire(){
    // 이미 제출 중이면 중단
    if (isSubmitting) {
      return;
    }

    if(!checkValidation()) return;
    
    // 제출 시작
    isSubmitting = true;
    setButtonLoading(true);
    
    let data = getParam();
    console.log('data', data)
    
    $.ajax({
      url: "https://admin-api-prod.selectstar.co.kr/sales",
      dataType: "json",
      contentType : "application/json; charset=utf-8",
      method: 'post',
      data: JSON.stringify({
        ...data
      }),
      complete : function(xhr, status) {
        // 제출 완료 - 로딩 상태 해제
        isSubmitting = false;
        setButtonLoading(false);
        
        if(xhr.status === 200){
          let data = getParam();
          if(data.isAgreeMarketing){
            alert(`문의가 완료되었습니다.\n${getFormatDateKorean(Date.now())}에 마케팅 정보 수신에 동의하셨습니다 - 셀렉트스타(주)`);
          }else {
            alert("문의가 완료되었습니다.");
          }
          clear();
          location.href = 'https://selectstar.ai/contact_submit';
        }else {
          let errorCode = xhr.data.error_code;
          if(errorCode !== undefined && errorCode.indexOf("100")){
            let message = xhr.data.message;
            alert('문의를 실패하였습니다.\n* ' + message)
          }else {
            alert('문의를 실패하였습니다. 셀렉트스타 고객센터를 연락주시기 바랍니다!')
          }
        }
      },
      error: function() {
        // 에러 발생 시에도 로딩 상태 해제
        isSubmitting = false;
        setButtonLoading(false);
      }
    });
  }

  function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name) || '';
  }

  function getLocalStorageValue(key) {
    return localStorage.getItem(key) || '';
  }

  function getParam(){
    let name = document.getElementById('txf_name').value;
    let phone = document.getElementById('txf_phone').value;
    let dataType = document.getElementById('txf_data_type').value;
    let email = document.getElementById('txf_email').value;
    let company = document.getElementById('txf_company').value;
    let counselingType = document.getElementById('counseling_type').value;
    let routeType = document.getElementById('route_type').value;
    let description = document.getElementById('txf_description').value;
    let isAgreeMarketing = document.getElementById('check2').checked;
    let isAgreePrivacy = document.getElementById('check1').checked;
    let marketingMetadata = {
      utmSource: getQueryParam('utm_source'),
      utmMedium: getQueryParam('utm_medium'),
      utmCampaign: getQueryParam('utm_campaign'),
      landingPage: window.location.href || '',
      referrer: document.referrer || '',
      firstUtmSource: getLocalStorageValue('first_utm_source'),
      firstUtmMedium: getLocalStorageValue('first_utm_medium'),
      firstUtmCampaign: getLocalStorageValue('first_utm_campaign'),
      firstLandingPage: getLocalStorageValue('first_landing_page'),
      firstReferrer: getLocalStorageValue('first_referrer') 
    };
    return {
      name, phone, dataType, email, company, counselingType, description, routeType,
      isAgreeMarketing, isAgreePrivacy, marketingMetadata
    }
  }
</script>
<div class="modal">
    <div style="display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <span style="color: #495057!important; font-weight: 600!important; font-size: 2.25rem; margin-top: 40px;">Data-Centric AI</span>
        <span>AI 성능 개선, 데이터로부터 시작됩니다.</span>
    </div>
  <div class="modal-scroll">
    <div class="form-section">
      <div class="form-row">
        <div class="form-col">
          <div class="form-group">
            <label class="form-label">성함</label>
            <input tabindex="1" id="txf_name" type="text" name="#" class="form-input" placeholder="김셀렉">
          </div>
          <div class="form-group">
            <label class="form-label">연락처</label>
            <input tabindex="3" id="txf_phone" type="text" name="#" class="form-input" placeholder="01055556666">
          </div>
          <div class="form-group">
            <label class="form-label">데이터 종류</label>
            <select tabindex="5" id="txf_data_type" class="form-select">
              <option>선택해주세요</option>
              <option value="이미지">이미지</option>
              <option value="비디오">비디오</option>
              <option value="오디오">오디오</option>
              <option value="라이다">라이다</option>
              <option value="텍스트/문서">텍스트/문서</option>
              <option value="기타">기타</option>
            </select>
          </div>
        </div>
        <div class="form-col">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input tabindex="2" id="txf_email" type="email" name="#" class="form-input" placeholder="email@selectstar.ai">
          </div>
          <div class="form-group">
            <label class="form-label">기관명</label>
            <input tabindex="4" id="txf_company" type="text" name="#" class="form-input" placeholder="셀렉트스타 주식회사">
          </div>
          <div class="form-group">
            <label class="form-label">상담 유형</label>
            <select tabindex="6" id="counseling_type" class="form-select">
              <option value="">선택해주세요</option>
              <option value="신뢰성 검증">신뢰성 검증</option>
              <option value="레드티밍">레드티밍</option>
              <option value="데이터셋 구축">데이터셋 구축</option>
              <option value="데이터셋 구매 / 판매">데이터셋 구매 / 판매</option>
              <option value="기타">기타</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">방문 경로</label>
        <select tabindex="7" id="route_type" class="form-select">
            <option value="">셀렉트스타를 어떻게 알게되었는지 선택해주세요.</option>
            <option value="지인추천">지인추천</option>
            <option value="언론보도">언론보도</option>
            <option value="오프라인 행사">오프라인 행사</option>
            <option value="SNS 광고">SNS 광고</option>
            <option value="셀렉트스타 뉴스레터">셀렉트스타 뉴스레터</option>
            <option value="유튜브">유튜브</option>
            <option value="카카오톡 오픈채팅방">카카오톡 오픈채팅방</option>
            <option value="메일">메일</option>
            <option value="포털사이트(연관 검색어)">포털사이트(연관 검색어)</option>
            <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">AI 도입과 학습 데이터 등에 대해 궁금하신 점을 구체적으로 말씀해 주세요</label>
        <textarea tabindex="8" id="txf_description" name="#" class="form-textarea" placeholder="프로젝트 개요, 일정, 규모에 대해 각각 말씀해 주시면 좋습니다."></textarea>
      </div>
    </div>
    <div class="checkbox-section">
      <div class="checkbox-group">
        <input type="checkbox" id="check1" name="#" class="form-checkbox">
        <label class="label" for="check1">
          (필수) 위 개인정보를 사업 상담에 활용하는 것에 동의합니다.
          <button onclick="window.open('https://selectstar.ai/policy1')" type="button" >개인정보 동의서 보기</button>
        </label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="check2" name="#" class="form-checkbox">
        <label class="label" for="check2">
          <strong>(선택) Email을 통한 서비스 안내 및 마케팅 정보 수신에 동의합니다.</strong><br>
          단, 수신 동의 거부시에도 문의 및 자료 제공은 가능합니다.
          <button onclick="window.open('https://selectstar.ai/policy2')" type="button" >마케팅 정보 동의서 보기</button>
        </label>
      </div>
    </div>
    <button type="button" id="btn_request_done" onclick="doInquire()" class="form-button">
      <span id="button-text">문의하기</span>
      <div id="button-spinner" class="spinner" style="display: none;"></div>
    </button>
  </div>
</div>
